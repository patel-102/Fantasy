<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Firebase Auth</title>
</head>
<body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAxA2Paas-tT0R2SHcoHZWmX_IaT92CsA",
  authDomain: "moon-2263a.firebaseapp.com",
  projectId: "moon-2263a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// attach globally
window.loginUser = function(email, password) {
    signInWithEmailAndPassword(auth, email, password)
        .then(() => {
            if (window.Android) Android.onLoginSuccess("Login Success");
        })
        .catch(err => {
            if (window.Android) Android.onLoginError(err.message);
        });
};
</script>

</body>
</html>
