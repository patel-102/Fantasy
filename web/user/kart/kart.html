<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXUS | Inventory Feed</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* -----------------------------------------------------------
           SYSTEM DESIGN TOKENS
        ----------------------------------------------------------- */
        :root {
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.1);
            --bg: #050505;
            --panel: #0d0d0f;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #52525b;
            --text-mute: #3f3f46;
            --safe-bottom: env(safe-area-inset-bottom);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scrollbar-width: none;
        }

        *::-webkit-scrollbar { display: none; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 120px;
            -webkit-font-smoothing: antialiased;
        }

        /* -----------------------------------------------------------
           OS HEADER
        ----------------------------------------------------------- */
        .os-header {
            height: 50px;
            width: 100%;
            display: grid;
            grid-template-columns: 60px 1fr 60px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 5000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border);
            padding: 0 10px;
        }

        .brand-text {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--text-dim);
            text-align: center;
        }

        .header-action {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            font-size: 15px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .header-action:active { color: var(--accent); }

        /* -----------------------------------------------------------
           VERTICAL INVENTORY FEED
        ----------------------------------------------------------- */
        .inventory-viewport {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .module-node {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            overflow: hidden;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            position: relative;
            transition: transform 0.4s var(--transition);
            animation: nodeReveal 0.6s var(--transition) backwards;
        }

        @keyframes nodeReveal {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .module-node:active {
            transform: scale(0.97);
        }

        .media-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: radial-gradient(circle at center, #0a0a0c 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            cursor: pointer;
        }

        .media-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .meta-container {
            padding: 20px;
            text-align: center;
            border-top: 1px solid var(--border);
            cursor: pointer;
        }

        .module-name {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 6px;
            color: #fff;
        }

        .module-price {
            font-size: 11px;
            font-weight: 900;
            color: var(--accent);
        }

        /* REMOVE ACTION */
        .remove-node {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            background: rgba(239, 68, 68, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            font-size: 11px;
            border: 1px solid rgba(239, 68, 68, 0.1);
            z-index: 10;
        }

        /* -----------------------------------------------------------
           SYSTEM DOCK
        ----------------------------------------------------------- */
        .dock-wrapper {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9000;
            padding-bottom: var(--safe-bottom);
        }

        .dock-container {
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 6px;
            display: flex;
            gap: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 46px;
            border-radius: 20px;
            color: var(--text-mute);
            text-decoration: none;
            transition: 0.3s;
        }

        .dock-item i { font-size: 14px; margin-bottom: 3px; }
        .dock-item span { font-size: 6px; font-weight: 800; text-transform: uppercase; }
        .dock-item.active { color: #fff; background: var(--accent); }

        /* NOTIFIER */
        #os-toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
            background: #fff; color: #000; padding: 8px 16px; border-radius: 50px;
            font-size: 9px; font-weight: 900; text-transform: uppercase;
            z-index: 9999; opacity: 0; pointer-events: none; transition: 0.4s;
        }
    </style>
</head>
<body class="hide-scroll">

    <div id="os-toast">Protocol Updated</div>

    <header class="os-header">
        <div class="header-action"></div> <div class="brand-text">Kart Archive</div>
        <a href="myorder.html" class="header-action">
            <i class="fa-solid fa-receipt"></i>
        </a>
    </header>

    

    <main class="inventory-viewport" id="kart-feed">
        <div class="module-node bg-white/5 h-64 animate-pulse"></div>
        <div class="module-node bg-white/5 h-64 animate-pulse opacity-50"></div>
    </main>

    <div class="dock-wrapper">
        <nav class="dock-container">
            <a href="shop.html" class="dock-item">
                <i class="fas fa-shopping-bag"></i>
                <span>Shop</span>
            </a>
            <a href="kart.html" class="dock-item active">
                <i class="fas fa-box-open"></i>
                <span>Kart</span>
            </a>
            <a href="profile.html" class="dock-item">
                <i class="fas fa-user-circle"></i>
                <span>User</span>
            </a>
            <a href="games.html" class="dock-item">
                <i class="fas fa-gamepad"></i>
                <span>Play</span>
            </a>
            <a href="myblog.html" class="dock-item">
                <i class="fas fa-stream"></i>
                <span>Blog</span>
            </a>
        </nav>
    </div>

    <script type="module">
        import { db } from 'https://patel-102.github.io/Fantasy/firebase2.js';
        import { collection, onSnapshot, doc, deleteDoc } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js';

        /**
         * NEXUS Kart Engine
         */
        const KartEngine = {
            init() {
                console.log("Nexus: Initializing Inventory Sync...");
                this.sync();
            },

            /**
             * Real-time Firebase Link
             */
            sync() {
                onSnapshot(collection(db, "kart"), (snap) => {
                    const items = snap.docs.map(doc => ({ 
                        id: doc.id, 
                        ...doc.data() 
                    }));
                    this.render(items);
                });
            },

            /**
             * Navigation Logic
             */
            viewDetails(id) {
                if ("vibrate" in navigator) navigator.vibrate(15);
                window.location.href = `details.html?id=${id}`;
            },

            /**
             * Remove Logic
             */
            async removeModule(event, id) {
                event.stopPropagation(); // Prevents navigating to details.html when clicking delete
                if ("vibrate" in navigator) navigator.vibrate([30, 50]);
                
                try {
                    await deleteDoc(doc(db, "kart", id));
                    this.notify("Module Decommissioned");
                } catch (e) {
                    this.notify("Sync Error");
                }
            },

            /**
             * UI Rendering
             */
            render(items) {
                const feed = document.getElementById('kart-feed');
                
                if (items.length === 0) {
                    feed.innerHTML = `
                        <div class="text-center py-32 opacity-20">
                            <i class="fa-solid fa-microchip mb-4 text-xl"></i>
                            <p class="text-[8px] font-black uppercase tracking-[0.6em]">No Active Modules</p>
                        </div>
                    `;
                    return;
                }

                feed.innerHTML = items.map((item, index) => `
                    <article class="module-node" style="animation-delay: ${index * 0.1}s">
                        <button class="remove-node" onclick="KartEngine.removeModule(event, '${item.id}')">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                        
                        <div class="media-container" onclick="KartEngine.viewDetails('${item.id}')">
                            <img src="${item.image}" alt="artifact" loading="lazy">
                        </div>
                        
                        <div class="meta-container" onclick="KartEngine.viewDetails('${item.id}')">
                            <h2 class="module-name">${item.name || 'Unknown Module'}</h2>
                            <p class="module-price">₹${Number(item.price).toLocaleString()}</p>
                        </div>
                    </article>
                `).join('');
            },

            notify(msg) {
                const toast = document.getElementById('os-toast');
                toast.innerText = msg;
                toast.style.opacity = "1";
                setTimeout(() => toast.style.opacity = "0", 2500);
            }
        };

        // Bind to Window
        window.KartEngine = KartEngine;
        KartEngine.init();
    </script>
</body>
</html>
