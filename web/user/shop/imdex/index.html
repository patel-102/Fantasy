<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Accessing System</title>
    <style>
        :root {
            --primary: #00ffcc;
            --bg: #050505;
            --dim: #1a1a1a;
            --error: #ff3333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #gateway-visuals {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .core-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border: 2px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.05);
        }

        .scanner-beam {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            top: 50%;
            animation: scan 2s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.3s;
        }

        canvas#particle-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        #secure-progress {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: var(--dim);
            border-radius: 10px;
            overflow: hidden;
        }

        #secure-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .status-text {
            margin-top: 40px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Error Styles */
        .error-state #secure-bar { background: var(--error); box-shadow: 0 0 15px var(--error); }
        .error-state .core-ring { border-color: rgba(255, 51, 51, 0.2); }
        .error-state .status-text { color: var(--error); }

        @keyframes scan {
            0% { transform: translateY(-60px) scaleX(0.4); opacity: 0; }
            50% { transform: translateY(0) scaleX(1); opacity: 1; }
            100% { transform: translateY(60px) scaleX(0.4); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="gateway-visuals">
        <canvas id="particle-layer"></canvas>
        <div class="core-ring"></div>
        <div class="scanner-beam" id="scanner"></div>
        <div id="secure-progress">
            <div id="secure-bar"></div>
        </div>
    </div>
    <div class="status-text" id="status">Initializing...</div>

<script type="module">
    import { auth, db } from 'https://patel-102.github.io/Fantasy/firebase2.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    class Visuals {
        constructor() {
            this.canvas = document.getElementById('particle-layer');
            this.ctx = this.canvas.getContext('2d');
            this.bar = document.getElementById('secure-bar');
            this.status = document.getElementById('status');
            this.scanner = document.getElementById('scanner');
            
            this.width = 300;
            this.height = 300;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
            
            this.particles = [];
            this.active = true;
            this.animate = this.animate.bind(this);
            this.init();
        }

        init() {
            for(let i=0; i<50; i++) {
                this.particles.push({
                    x: 150, y: 150,
                    angle: Math.random() * Math.PI * 2,
                    vel: 0.5 + Math.random(),
                    life: Math.random() * 100
                });
            }
            this.animate();
        }

        update(pct, text) {
            this.bar.style.width = pct + '%';
            this.status.innerText = text;
            if(pct > 15) this.scanner.style.opacity = '1';
        }

        animate() {
            if(!this.active) return;
            this.ctx.clearRect(0,0,300,300);
            this.ctx.fillStyle = document.body.classList.contains('error-state') ? '#ff3333' : '#00ffcc';
            this.particles.forEach(p => {
                p.life--;
                p.x += Math.cos(p.angle) * p.vel;
                p.y += Math.sin(p.angle) * p.vel;
                this.ctx.globalAlpha = p.life/100;
                this.ctx.beginPath();
                this.ctx.arc(p.x, p.y, 1.5, 0, Math.PI*2);
                this.ctx.fill();
                if(p.life <= 0) { p.x=150; p.y=150; p.life=100; }
            });
            requestAnimationFrame(this.animate);
        }
    }

    class Gateway {
        constructor() {
            this.v = new Visuals();
            this.config = {
                TARGET: "user/shop/shop.html", // Corrected path based on your structure
                LOGIN: "login.html",
                MIN_TIME: 1800
            };
            this.start = Date.now();
        }

        async run() {
            this.v.update(20, "Authenticating...");
            
            onAuthStateChanged(auth, async (user) => {
                if (!user) {
                    this.v.update(100, "Redirecting to Login...");
                    setTimeout(() => window.location.replace(this.config.LOGIN), 800);
                    return;
                }

                try {
                    this.v.update(45, "Fetching User Profile...");
                    const snap = await getDoc(doc(db, "users", user.uid));
                    const role = snap.exists() ? (snap.data().role || "user") : "guest";
                    
                    this.v.update(75, "Generating Session Token...");
                    const token = this.token(user, role);
                    
                    const wait = Math.max(0, this.config.MIN_TIME - (Date.now() - this.start));
                    
                    setTimeout(() => {
                        this.v.update(100, "Access Granted");
                        window.location.replace(`${this.config.TARGET}?data=${token}`);
                    }, wait);

                } catch (err) {
                    console.error(err);
                    document.body.classList.add('error-state');
                    this.v.update(100, "System Failure");
                    setTimeout(() => window.location.replace(this.config.LOGIN), 3000);
                }
            });
        }

        token(user, role) {
            const data = JSON.stringify({
                uid: user.uid,
                role: role,
                email: user.email,
                time: Date.now()
            });
            // Safe Base64 encoding for URLs
            return btoa(encodeURIComponent(data).replace(/%([0-9A-F]{2})/g, (m, p) => String.fromCharCode('0x' + p)));
        }
    }

    // Launch
    new Gateway().run();
</script>
</body>
</html>
