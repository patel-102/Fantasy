<!DOCTYPE html>
<html lang="en" oncontextmenu="return false;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Profile</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/sha512.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@400;700&display=swap');

        :root {
            --primary: #00f2ff;
            --accent: #bc00ff;
            --panel-bg: rgba(6, 6, 10, 0.98);
            --text: #ffffff;
            --text-dim: #8e8e93;
            --danger: #ff3b30;
            --security: #00ff41;
            --drawer-w: 280px;
        }

        body {
            background: #020205;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* --- 1. LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0; background: #020205; z-index: 3000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s;
        }
        .spinner-outer {
            width: 50px; height: 50px; border: 2px solid rgba(0, 242, 255, 0.1);
            border-top: 2px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; display: flex;
            justify-content: center; align-items: center;
        }
        #pct-out { font-family: 'Syncopate'; font-size: 0.5rem; color: var(--primary); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- 2. NAVIGATION DRAWER --- */
        #menu-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px); z-index: 2000;
            visibility: hidden; opacity: 0; transition: 0.4s;
        }
        #menu-overlay.active { visibility: visible; opacity: 1; }
        #drawer {
            position: absolute; top: 0; left: calc(-1 * var(--drawer-w));
            width: var(--drawer-w); height: 100%; background: var(--panel-bg);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; padding: 40px 0;
        }
        #menu-overlay.active #drawer { left: 0; }
        .drawer-user { text-align: center; padding-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .drawer-avatar { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--primary); padding: 3px; margin-bottom: 12px; object-fit: cover; }
        .drawer-name { font-family: 'Syncopate'; font-size: 0.7rem; color: var(--primary); letter-spacing: 2px; }

        .menu-list { display: flex; flex-direction: column; flex-grow: 1; }
        .menu-item {
            padding: 14px 30px; color: #ccc; text-decoration: none; font-size: 0.8rem;
            letter-spacing: 1px; transition: 0.3s; border-left: 3px solid transparent;
        }
        .menu-item:hover { background: rgba(0,242,255,0.05); border-left-color: var(--primary); color: var(--primary); padding-left: 35px; }
        .active-link { color: var(--primary); border-left-color: var(--primary); background: rgba(0,242,255,0.05); }
        .logout-item { margin-top: auto; color: var(--danger); border-top: 1px solid rgba(255,255,255,0.05); }

        /* --- 3. HEADER --- */
        .header {
            padding: 20px 24px; background: rgba(2, 2, 5, 0.95); backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(0, 242, 255, 0.2); position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .menu-dots { background: transparent; border: none; cursor: pointer; display: flex; flex-direction: column; gap: 5px; padding: 5px; }
        .menu-dots span { width: 22px; height: 3px; background: var(--primary); border-radius: 4px; box-shadow: 0 0 8px rgba(0, 242, 255, 0.5); }
        .header-title { font-family: 'Syncopate'; font-size: 1rem; font-weight: 700; color: var(--primary); letter-spacing: 3px; }

        /* --- 4. PROFILE CONTENT --- */
        .container { padding: 25px 15px; max-width: 500px; margin: 0 auto; }
        .node-card {
            background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 35px 25px; position: relative;
        }

        .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .avatar-ring {
            position: relative; width: 110px; height: 110px; border-radius: 50%; padding: 4px;
            background: conic-gradient(from 0deg, var(--primary), var(--accent), var(--security), var(--primary));
            animation: rotate-ring 4s linear infinite; cursor: pointer;
        }
        @keyframes rotate-ring { 100% { transform: rotate(360deg); } }
        .avatar-inner {
            width: 100%; height: 100%; border-radius: 50%; background: #000; overflow: hidden;
            border: 3px solid #06060a; transform: rotate(-360deg); animation: rotate-ring 4s linear infinite reverse;
        }
        #user-avatar { width: 100%; height: 100%; object-fit: cover; }
        .status-orb {
            position: absolute; bottom: 8px; right: 10px; width: 14px; height: 14px;
            border-radius: 50%; border: 3px solid #06060a; background: #333;
        }

        .field-grid { display: grid; gap: 15px; margin-top: 20px; }
        label { font-size: 0.6rem; font-family: 'Syncopate'; color: var(--primary); margin-bottom: 5px; display: block; }
        
        input, select, textarea {
            width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; padding: 12px; color: #fff; font-family: inherit; font-size: 0.9rem; box-sizing: border-box;
        }

        .p-text { display: none; padding: 10px 0; color: #ccc; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        body.preview-mode input, body.preview-mode select, body.preview-mode textarea { display: none; }
        body.preview-mode .p-text { display: block; }

        /* Role is always read-only */
        .role-box { color: var(--accent); font-weight: bold; border-bottom: 1px solid rgba(188, 0, 255, 0.2); }

        .btn {
            width: 100%; padding: 15px; border-radius: 10px; font-family: 'Syncopate';
            font-size: 0.7rem; cursor: pointer; border: none; margin-top: 20px;
        }
        #edit-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        #save-btn { background: var(--primary); color: #000; display: none; }
        #cancel-btn { background: var(--danger); color: #fff; margin-top: 10px; display: none; }

        body:not(.preview-mode) #save-btn, body:not(.preview-mode) #cancel-btn { display: block; }
        body:not(.preview-mode) #edit-btn { display: none; }
        
        @keyframes pulse-glow { 0% { box-shadow: 0 0 5px var(--security); } 50% { box-shadow: 0 0 15px var(--security); } 100% { box-shadow: 0 0 5px var(--security); } }
    </style>
</head>
<body class="preview-mode">

<div id="loading-screen">
    <div class="spinner-outer"><div id="pct-out">0%</div></div>
    <p style="color:var(--primary); font-size:0.4rem; letter-spacing:2px; margin-top:10px;">LOADING PROFILE</p>
</div>

<div id="menu-overlay">
    <div id="drawer">
        <div class="drawer-user">
            <img id="drawer-img" class="drawer-avatar" src="https://ui-avatars.com/api/?background=000&color=00f2ff" alt="User">
            <div id="drawer-alias" class="drawer-name">USERNAME</div>
        </div>
        <nav class="menu-list">
            <a href="myshop.html" class="menu-item active-link">Mystore</a>
            <a href="MyProfile.html" class="menu-item">My Profile</a>
            <a href="wishlist.html" class="menu-item">kart</a>
                <a href="diary.html" class="menu-item">BLOG</a>
            <a href="refer.html" class="menu-item">REFERRALS</a>        
            <a href="card.html" class="menu-item">Banner</a>
           <a href="#" id="logout-trigger" class="menu-item logout-item">LOGOUT</a>
        
        </nav>
    </div>
</div>

<header class="header">
    <div class="header-left">
        <button class="menu-dots" id="mainMenu"><span></span><span></span><span></span></button>
        <div class="header-title">PROFILE</div>
    </div>
    <div id="status-text" style="font-size:0.5rem; font-family:'Syncopate';">CONNECTING...</div>
</header>

<div class="container">
    <div class="node-card">
        <div class="avatar-section">
            <div class="avatar-ring" id="avatar-trigger">
                <div class="avatar-inner">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?background=000&color=00f2ff">
                </div>
                <div id="status-orb" class="status-orb"></div>
            </div>
            <h1 id="display-name" style="font-family:'Syncopate'; font-size:1.1rem; margin:15px 0 5px;">...</h1>
            <div id="display-alias" style="font-size:0.6rem; color:var(--primary); letter-spacing:2px;">@USERNAME</div>
            <div id="creation-date" style="font-size:0.5rem; color:var(--accent); margin-top:8px;">JOINED: --/--/----</div>
        </div>

        <div class="field-grid">
            <div class="field">
                <label>USER ROLE</label>
                <div class="p-text role-box" id="p-role" style="display:block;">Standard User</div>
            </div>

            <div class="field">
                <label>FULL NAME</label>
                <input type="text" id="name" placeholder="Enter Full Name">
                <div class="p-text" id="p-name">Not Specified</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="field">
                    <label>GENDER</label>
                    <select id="gender">
                        <option value="Unspecified">Choose</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                    <div class="p-text" id="p-gender">Unspecified</div>
                </div>
                <div class="field">
                    <label>AGE</label>
                    <input type="text" id="age" placeholder="Age" maxlength="2">
                    <div class="p-text" id="p-age">--</div>
                </div>
            </div>
            <div class="field">
                <label>MOBILE NUMBER</label>
                <input type="tel" id="mobile" placeholder="Mobile Number">
                <div class="p-text" id="p-mobile">Not Specified</div>
            </div>
            <div class="field">
                <label>ADDRESS</label>
                <input type="text" id="address" placeholder="Location">
                <div class="p-text" id="p-address">Not Specified</div>
            </div>
            <div class="field">
                <label>BIO</label>
                <textarea id="bio" rows="2" placeholder="Tell us about yourself..."></textarea>
                <div class="p-text" id="p-bio">No bio available.</div>
            </div>
        </div>

        <button class="btn" id="edit-btn">EDIT PROFILE</button>
        <button class="btn" id="save-btn">SAVE CHANGES</button>
        <button class="btn" id="cancel-btn">CANCEL</button>
    </div>
</div>

<script type="module">
    import { auth, db } from 'https://patel-102.github.io/Fantasy/firebase2.js';
    import { getDatabase, ref, onValue, onDisconnect, set, serverTimestamp as rtdbTimestamp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-database.js';
    import { doc, getDoc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js';
    import { signOut } from 'https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js';

    const rtdb = getDatabase();
    const _SALT = "C4rt00n_Vault_Alpha_99";
    let stagedAvatarUrl = "";

    const menuBtn = document.getElementById('mainMenu');
    const overlay = document.getElementById('menu-overlay');
    menuBtn.onclick = () => overlay.classList.add('active');
    overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove('active'); };

    function runLoader() {
        let p = 0;
        const load = setInterval(() => {
            p += Math.floor(Math.random() * 20) + 5;
            if (p >= 100) {
                document.getElementById('pct-out').innerText = "100%";
                clearInterval(load);
                setTimeout(() => { 
                    document.getElementById('loading-screen').style.opacity = '0'; 
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500); 
                }, 300);
            } else { document.getElementById('pct-out').innerText = p + "%"; }
        }, 80);
    }

    const decrypt = (str) => {
        try { return CryptoJS.AES.decrypt(str, _SALT).toString(CryptoJS.enc.Utf8); } catch(e) { return "User"; }
    };

    function initPresence(uid) {
        const statusRef = ref(rtdb, '/status/' + uid);
        onValue(ref(rtdb, '.info/connected'), (snap) => {
            if (snap.val() === false) return;
            onDisconnect(statusRef).set({ state: 'offline' })
                .then(() => set(statusRef, { state: 'online' }));
        });
        onValue(statusRef, (snap) => {
            const orb = document.getElementById('status-orb');
            const txt = document.getElementById('status-text');
            if (snap.val()?.state === 'online') {
                orb.style.background = 'var(--security)';
                orb.style.animation = 'pulse-glow 2s infinite';
                txt.innerText = "ONLINE"; txt.style.color = 'var(--security)';
            } else {
                orb.style.background = '#333'; orb.style.animation = 'none';
                txt.innerText = "OFFLINE"; txt.style.color = 'var(--danger)';
            }
        });
    }

    async function loadProfile(user) {
        const creationDate = new Date(user.metadata.creationTime).toLocaleDateString();
        document.getElementById('creation-date').innerText = `JOINED: ${creationDate}`;
        
        const snap = await getDoc(doc(db, "users", user.uid));
        if (snap.exists()) {
            const d = snap.data();
            const alias = decrypt(d.alias);
            
            document.getElementById('drawer-alias').innerText = alias;
            document.getElementById('display-alias').innerText = `@${alias}`;
            document.getElementById('display-name').innerText = d.name || "UNNAMED";
            
            // Set the Role (Not editable)
            document.getElementById('p-role').innerText = d.role || "Standard User";
            
            stagedAvatarUrl = d.photo_url || `https://ui-avatars.com/api/?background=000&color=00f2ff&name=${alias}`;
            document.getElementById('user-avatar').src = stagedAvatarUrl;
            document.getElementById('drawer-img').src = stagedAvatarUrl;

            ['name', 'gender', 'age', 'mobile', 'address', 'bio'].forEach(key => {
                if(d[key]) {
                    document.getElementById(key).value = d[key];
                    document.getElementById('p-' + key).innerText = d[key];
                }
            });
        }
        runLoader();
    }

    document.getElementById('avatar-trigger').onclick = () => {
        if (document.body.classList.contains('preview-mode')) return;
        const seed = Math.random().toString(36).substring(7);
        stagedAvatarUrl = `https://api.dicebear.com/7.x/lorelei/svg?seed=${seed}&backgroundColor=020205`;
        document.getElementById('user-avatar').src = stagedAvatarUrl;
    };

    document.getElementById('edit-btn').onclick = () => document.body.classList.remove('preview-mode');
    document.getElementById('cancel-btn').onclick = () => {
        document.body.classList.add('preview-mode');
        loadProfile(auth.currentUser);
    };

    document.getElementById('save-btn').onclick = async () => {
        const btn = document.getElementById('save-btn');
        btn.disabled = true; btn.innerText = "SAVING...";

        // Role is NOT included in the update payload to prevent changes
        const payload = {
            name: document.getElementById('name').value,
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value,
            mobile: document.getElementById('mobile').value,
            address: document.getElementById('address').value,
            bio: document.getElementById('bio').value,
            photo_url: stagedAvatarUrl,
            last_updated: serverTimestamp()
        };

        try {
            await updateDoc(doc(db, "users", auth.currentUser.uid), payload);
            location.reload();
        } catch (e) { alert("Save failed"); btn.disabled = false; }
    };

    document.getElementById('logout-trigger').onclick = () => {
        if(confirm("Logout?")) signOut(auth).then(() => window.location.href="index.html");
    };

    auth.onAuthStateChanged(user => {
        if (user) { initPresence(user.uid); loadProfile(user); }
        else { window.location.href = "index.html"; }
    });
</script>
</body>
</html>
